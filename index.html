<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Para ti</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="reel" aria-label="Proyecto romantico vertical">
      <div class="pink-sky" aria-hidden="true">
        <span class="glow glow-a"></span>
        <span class="glow glow-b"></span>
        <span class="glow glow-c"></span>
        <div class="hearts"></div>
      </div>

      <section class="stage-card" aria-label="Animacion romantica principal">
        <canvas id="loveCanvas"></canvas>

        <div class="photo-cloud" aria-hidden="true">
          <img src="assets/foto1.jpeg" alt="" class="photo photo-1" />
          <img src="assets/foto2.jpeg" alt="" class="photo photo-2" />
          <img src="assets/foto3.jpeg" alt="" class="photo photo-3" />
          <img src="assets/foto4.jpeg" alt="" class="photo photo-4" />
          <img src="assets/foto5.jpeg" alt="" class="photo photo-5" />
          <img src="assets/foto6.jpeg" alt="" class="photo photo-6" />
          <img src="assets/foto7.jpeg" alt="" class="photo photo-7" />
        </div>

        <div class="love-words" aria-hidden="true">
          <span>Te quiero</span>
          <span>Mi chica</span>
          <span>Para ti</span>
          <span>Mi futuro lugar favorito</span>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
